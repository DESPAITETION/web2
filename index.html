        <form action="index.php" method="POST">

          <?php endif; ?>

          <div class="nojs-group">
            <label>Имя *</label>
            <input type="text" name="name" class="nojs-input" value="<?= htmlspecialchars($nojs_data['name'] ?? '') ?>">
